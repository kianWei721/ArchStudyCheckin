server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/arch_study_checkin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      table-prefix: ""

app:
  jwt:
    secret: ${JWT_SECRET:YXJjaHN0dWR5Y2hlY2tpbi1qd3Qtc2VjcmV0LWtleS0yMDI0LW11c3QtYmUtMzItYnl0ZXM=}
    expiration-ms: 86400000  # 24 hours
